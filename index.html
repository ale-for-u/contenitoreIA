<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>I miei link</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 600px;
      margin: 30px auto;
    }

    input {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      width: 70%;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background-color: #00c6ff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #0072ff;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255,255,255,0.1);
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    a {
      color: #00eaff;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>🔗 I miei link personali</h1>

  <div class="container">
    <input type="text" id="linkName" placeholder="Nome del sito">
    <input type="text" id="linkURL" placeholder="https://...">
    <br>
    <button onclick="addLink()">Aggiungi link</button>

    <ul id="linkList"></ul>
  </div>

  <script>
    function addLink() {
      const name = document.getElementById("linkName").value;
      const url = document.getElementById("linkURL").value;

      if (name === "" || url === "") {
        alert("Compila entrambi i campi!");
        return;
      }

      const li = document.createElement("li");
      const a = document.createElement("a");

      a.href = url;
      a.textContent = name;
      a.target = "_blank";

      li.appendChild(a);
      document.getElementById("linkList").appendChild(li);

      // Salvataggio in localStorage
      const links = JSON.parse(localStorage.getItem("links")) || [];
      links.push({ name, url });
      localStorage.setItem("links", JSON.stringify(links));

      document.getElementById("linkName").value = "";
      document.getElementById("linkURL").value = "";
    }

    function loadLinks() {
      const links = JSON.parse(localStorage.getItem("links")) || [];
      links.forEach(link => {
        const li = document.createElement("li");
        const a = document.createElement("a");

        a.href = link.url;
        a.textContent = link.name;
        a.target = "_blank";

        li.appendChild(a);
        document.getElementById("linkList").appendChild(li);
      });
    }

    window.onload = loadLinks;
  </script>

</body>
</html>
