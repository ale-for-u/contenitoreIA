<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>I miei link online</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
      color: white;
      text-align: center;
    }

    h1 { margin-top: 30px; }

    .container {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 600px;
      margin: 30px auto;
    }

    input {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      width: 70%;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background-color: #00c6ff;
      color: white;
      cursor: pointer;
    }

    ul { list-style: none; padding: 0; }

    li {
      background: rgba(255,255,255,0.1);
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    a { color: #00eaff; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

<h1>🌐 I miei link (online)</h1>

<div class="container">
  <input type="text" id="linkName" placeholder="Nome sito">
  <input type="text" id="linkURL" placeholder="https://...">
  <br>
  <button onclick="addLink()">Aggiungi</button>

  <ul id="linkList"></ul>
</div>

<script>
  // 🔴 METTI QUI I TUOI DATI FIREBASE
  const firebaseConfig = {
    apiKey: "INSERISCI_API_KEY",
    authDomain: "INSERISCI_AUTH_DOMAIN",
    projectId: "INSERISCI_PROJECT_ID",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function addLink() {
    const name = document.getElementById("linkName").value;
    const url = document.getElementById("linkURL").value;

    if (!name || !url) return alert("Compila tutto");

    db.collection("links").add({ name, url });

    document.getElementById("linkName").value = "";
    document.getElementById("linkURL").value = "";
  }

  function loadLinks() {
    db.collection("links").onSnapshot(snapshot => {
      const list = document.getElementById("linkList");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const li = document.createElement("li");
        const a = document.createElement("a");

        a.href = data.url;
        a.textContent = data.name;
        a.target = "_blank";

        li.appendChild(a);
        list.appendChild(li);
      });
    });
  }

  loadLinks();
</script>

</body>
</html>
